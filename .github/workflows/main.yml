name: Build SCTX-Converter for Termux

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Build Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake clang gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

    - name: Configure CMake
      run: |
        mkdir build
        cd build
        cmake .. -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++

    - name: Build Project
      run: |
        cd build
        make

    - name: Upload Binary Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SctxConverter-Termux-ARM64
        path: build/SctxConverter
