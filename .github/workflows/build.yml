name: Build SCTX-Converter for Termux

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Android NDK
      run: |
        sudo apt-get update
        sudo apt-get install -y wget unzip
        wget https://google.com -O ndk.zip
        unzip -q ndk.zip
        echo "ANDROID_NDK_HOME=$PWD/android-ndk-r26b" >> $GITHUB_ENV

    - name: Configure and Build with NDK
      run: |
        mkdir build && cd build
        $ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
        cmake .. \
          -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
          -DANDROID_ABI=arm64-v8a \
          -DANDROID_PLATFORM=android-24 \
          -DCMAKE_BUILD_TYPE=Release
        make

    - name: Upload Binary Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SctxConverter-Termux-ARM64
        path: build/SctxConverter
